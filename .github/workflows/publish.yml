name: Publish

# Prerelease channels:
#   staging branch → @beta  (integration, post-review features)
#   alpha branch   → @alpha (experimental, cutting-edge)
# @latest releases are fully automated by release.yml on merges to main.

on:
  push:
    branches: [staging, alpha]
  workflow_dispatch:

jobs:
  staging:
    name: Publish @beta
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for tag detection and commit counting

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Compute next stable version (dry run)
        id: next_ver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          major_string_token: 'BREAKING CHANGE'
          minor_string_token: 'feat'
          patch_string_token: 'fix,perf,refactor'
          release_branches: staging

      - name: Stamp prerelease version
        run: |
          # Use the computed next stable version so beta always sorts above the current @latest.
          # Fall back to a patch-bump of the current package.json version if the action returned nothing.
          NEXT="${{ steps.next_ver.outputs.new_version }}"
          if [ -z "$NEXT" ]; then
            CURRENT=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
            IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
            NEXT="${MAJ}.${MIN}.$((PAT + 1))"
          fi
          # Count commits since the last vX.Y.Z tag; this is the monotonically increasing beta counter.
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
          else
            COUNT=$(git rev-list --count HEAD)
          fi
          npm version "${NEXT}-beta.${COUNT}" --no-git-tag-version

      - name: Publish to npm @beta
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  alpha:
    name: Publish @alpha
    if: github.ref == 'refs/heads/alpha'
    runs-on: ubuntu-latest
    environment: alpha

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for tag detection and commit counting

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Compute next stable version (dry run)
        id: next_ver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          major_string_token: 'BREAKING CHANGE'
          minor_string_token: 'feat'
          patch_string_token: 'fix,perf,refactor'
          release_branches: alpha

      - name: Stamp prerelease version
        run: |
          NEXT="${{ steps.next_ver.outputs.new_version }}"
          if [ -z "$NEXT" ]; then
            CURRENT=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
            IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
            NEXT="${MAJ}.${MIN}.$((PAT + 1))"
          fi
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
          else
            COUNT=$(git rev-list --count HEAD)
          fi
          npm version "${NEXT}-alpha.${COUNT}" --no-git-tag-version

      - name: Publish to npm @alpha
        run: npm publish --tag alpha --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
