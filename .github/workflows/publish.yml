name: Publish

# Prerelease channels:
#   staging branch → @beta  (integration, post-review features)
#   alpha branch   → @alpha (experimental, cutting-edge)
# @latest releases are fully automated by release.yml on merges to main.

on:
  push:
    branches: [staging, alpha]
  workflow_dispatch:

jobs:
  staging:
    name: Publish @beta
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git rev-list can count commits since last tag

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Stamp prerelease version
        run: |
          # Strip any existing prerelease suffix so the base is always clean (e.g. 0.7.0)
          BASE=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
          # Count commits since the last vX.Y.Z tag; this is the beta counter.
          # Result: 0.7.0-beta.0, 0.7.0-beta.5, 0.7.0-beta.12 — strictly increasing.
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
          else
            COUNT=$(git rev-list --count HEAD)
          fi
          npm version "${BASE}-beta.${COUNT}" --no-git-tag-version

      - name: Publish to npm @beta
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  alpha:
    name: Publish @alpha
    if: github.ref == 'refs/heads/alpha'
    runs-on: ubuntu-latest
    environment: alpha

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git rev-list can count commits since last tag

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Stamp prerelease version
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
          else
            COUNT=$(git rev-list --count HEAD)
          fi
          npm version "${BASE}-alpha.${COUNT}" --no-git-tag-version

      - name: Publish to npm @alpha
        run: npm publish --tag alpha --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
