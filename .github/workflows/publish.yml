name: Publish

# Handles only the @beta prerelease path (staging branch).
# @latest releases are fully automated by release.yml on merges to main.

on:
  push:
    branches: [staging]     # → @beta publish
  workflow_dispatch:

jobs:
  staging:
    name: Publish @beta
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Stamp prerelease version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          npm version prerelease --preid="beta.${SHORT_SHA}" --no-git-tag-version

      - name: Publish to npm @beta
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
