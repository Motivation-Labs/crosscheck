name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force a specific version bump (overrides conventional-commit detection)'
        required: false
        default: ''
        type: choice
        options: ['', patch, minor, major]
      exact_version:
        description: 'Publish an exact version (e.g. 0.9.0). Overrides conventional-commit detection.'
        required: false
        default: ''
        type: string

# Skip the release cycle when the push is itself the version-bump commit or a
# docs-only / chore commit that carries no release signal.
jobs:
  release:
    name: Version, publish, and release
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore: release')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push git tag
      id-token: write   # npm provenance (optional but good practice)
      actions: write    # dispatch publish.yml after syncing version to staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so tag-action can read all commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      # Determine the next semantic version from conventional commits since the
      # last tag. dry_run=true means it computes the result without creating the
      # tag — we do that ourselves in the next step.
      # Skipped when exact_version is provided via workflow_dispatch.
      - name: Compute next version
        id: semver
        if: inputs.exact_version == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: ${{ inputs.bump || 'patch' }}
          # Map conventional commit prefixes to bump types
          major_string_token: 'BREAKING CHANGE'
          minor_string_token: 'feat'
          patch_string_token: 'fix,perf,refactor'

      # Merge the version from either source into a single output.
      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.exact_version }}" ]; then
            echo "new_version=${{ inputs.exact_version }}" >> $GITHUB_OUTPUT
            echo "new_tag=v${{ inputs.exact_version }}" >> $GITHUB_OUTPUT
            echo "changelog=" >> $GITHUB_OUTPUT
          else
            echo "new_version=${{ steps.semver.outputs.new_version }}" >> $GITHUB_OUTPUT
            echo "new_tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "changelog=${{ steps.semver.outputs.changelog }}" >> $GITHUB_OUTPUT
          fi

      # Update package.json for the npm publish (not committed back to main —
      # main branch protection blocks direct pushes from github-actions[bot]).
      # Only create the git tag if it doesn't already exist.
      - name: Tag release
        if: steps.ver.outputs.new_tag != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ steps.ver.outputs.new_version }}" ]; then
            npm version "${{ steps.ver.outputs.new_version }}" --no-git-tag-version
          fi
          if git rev-parse "${{ steps.ver.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.ver.outputs.new_tag }} already exists — skipping tag creation."
          else
            git tag "${{ steps.ver.outputs.new_tag }}"
            git push origin "${{ steps.ver.outputs.new_tag }}"
          fi

      - name: Publish to npm @latest
        if: steps.ver.outputs.new_tag != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.ver.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.new_tag }}
          name: ${{ steps.ver.outputs.new_tag }}
          body: ${{ steps.ver.outputs.changelog }}
          generate_release_notes: true   # appends GitHub's auto-notes below the changelog

      - name: Notify release published
        if: steps.ver.outputs.new_tag != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[crosscheck] ${{ steps.ver.outputs.new_tag }} published to npm"
          to: ${{ secrets.MAIL_USERNAME }}
          from: crosscheck-ci <${{ secrets.MAIL_USERNAME }}>
          body: |
            crosscheck ${{ steps.ver.outputs.new_tag }} has been published to npm as @latest.

            Install: npm install -g @motivation-labs/crosscheck@${{ steps.ver.outputs.new_tag }}

            GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.new_tag }}

            Changes:
            ${{ steps.ver.outputs.changelog }}

      # Sync the released package.json version back to staging so the next @beta
      # build produces a pre-release of the *next* version, not a re-stamp of the
      # version that is now @latest.
      - name: Sync release version to staging
        if: steps.ver.outputs.new_tag != ''
        run: |
          git fetch origin staging
          git checkout staging
          git checkout main -- package.json package-lock.json
          if git diff --cached --quiet; then
            echo "staging already at ${{ steps.ver.outputs.new_tag }} — nothing to sync"
          else
            git commit -m "chore: sync ${{ steps.ver.outputs.new_tag }} version to staging"
            git push origin staging
          fi

      # GITHUB_TOKEN pushes do not trigger downstream workflows, so dispatch
      # publish.yml on staging explicitly to kick off the next @beta build.
      - name: Trigger @beta publish on staging
        if: steps.ver.outputs.new_tag != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yml',
              ref: 'staging',
            })

      - name: No release needed
        if: steps.ver.outputs.new_tag == ''
        run: echo "No version-worthy commits since last tag — skipping publish."
