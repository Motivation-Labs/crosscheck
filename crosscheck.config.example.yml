# crosscheck.config.yml
# This file is designed to be easily read and modified by coding agents.
# All fields are optional — crosscheck uses sensible defaults.

# ─── Deployment ──────────────────────────────────────────────────────────────
# Set automatically on first run of `crosscheck watch` or `crosscheck serve`.
# personal — monitor your own repos and orgs; review only PRs you author
# team     — monitor org repos only; review all PRs from any author
# Absent = first-run prompt will ask you to choose.
# deployment: personal

# ─── Mode ────────────────────────────────────────────────────────────────────
# single-vendor: one AI reviews all PRs
# cross-vendor:  each AI reviews the other's PRs (Claude ↔ Codex)
mode: cross-vendor

# ─── Clone protocol ──────────────────────────────────────────────────────────
# How crosscheck clones PR repos for review.
# ssh   — git@github.com:owner/repo.git (uses your local SSH keys)
# https — https://github.com/owner/repo.git (uses GitHub token)
# Pick https if you have a multi-account SSH setup or your default SSH key
# cannot access target repos. Independent of `gh config get git_protocol`.
clone_protocol: ssh

# ─── Git reliability ─────────────────────────────────────────────────────────
# Retries required clone/fetch operations before a PR run fails. `auto` starts
# with Git defaults and falls back to HTTP/1.1 after HTTP/2 transport errors.
git:
  clone_attempts: 4
  retry_base_delay_ms: 2000
  https_version: auto       # auto | HTTP/2 | HTTP/1.1

# ─── Vendors ─────────────────────────────────────────────────────────────────
vendors:
  codex:
    enabled: true
    model: o4-mini          # o4-mini | o3 | gpt-4o  (cost/quality tradeoff)
    auth: subscription      # subscription (device-auth OAuth) | api-key
    # timeout_sec: 1200     # max seconds per CLI call; unset = tier-based (300/600/1200)

  claude:
    enabled: true
    model: sonnet           # haiku | sonnet | opus
    effort: medium          # low | medium | high | max
    # timeout_sec: 1200     # max seconds per CLI call; unset = 180. Raise for large PRs.

# ─── Quality & Focus ─────────────────────────────────────────────────────────
quality:
  tier: balanced            # fast | balanced | thorough
  #
  # Tier determines the model and effort level used for each vendor:
  #
  #   tier       claude               codex        time     cost
  #   ─────────  ───────────────────  ───────────  ───────  ──────
  #   fast       haiku · low          o4-mini · low   ~10s  lowest
  #   balanced   sonnet · medium      o4-mini · med   ~30s  standard
  #   thorough   sonnet · max         o3 · high       ~60s  higher
  #
  # crosscheck onboard writes these automatically when you pick a tier.
  # You can override individual vendor settings in the vendors: block below.

  focus:                    # optional — narrows review scope
    - security
    - types
    - performance
    # - naming
    # - test-coverage
    # - documentation

  custom_prompt: |          # optional — appended to every review
    Focus on correctness and security. Be concise.

# ─── Budget ──────────────────────────────────────────────────────────────────
budget:
  codex_monthly_usd: 20     # null = unlimited (use if on subscription)
  per_review_usd: 2.00      # hard stop per single review

# ── Orgs (watch/serve mode) ───────────────────────────────────────────────────
# Monitor entire orgs — all repos get covered with one webhook per org.
# Takes priority over `repos` when both are set.
orgs:
  - motivation-labs
  - codatta

# ─── Users ───────────────────────────────────────────────────────────────────
# Monitor all repos owned by personal GitHub accounts (non-org).
# At startup, crosscheck enumerates each user's repos and registers webhooks.
# Useful when your AI agents open PRs across many personal repos.
# Combines with `orgs` and `repos` — all configured sources are additive.
# users:
#   - beingzy          # your personal account
#   - my-agent-login   # a bot account that pushes to its own repos

# ─── Repos ───────────────────────────────────────────────────────────────────
# Omit entirely to auto-detect from `git remote` (useful in watch mode)
# repos: still works for monitoring specific repos only
# repos:
#   - owner: acme
#     name: specific-repo
repos:
  - owner: codatta
    name: my-repo

# ─── Routing ─────────────────────────────────────────────────────────────────
routing:
  # Restrict reviews to PRs opened by these GitHub logins.
  # Auto-filled with your login by `crosscheck init` or first `crosscheck watch`.
  # Empty list = no author restriction (applies body-pattern check only).
  # allowed_authors:
  #   - beingzy          # your personal account (Claude Code runs as you)
  #   - my-org-bot       # a dedicated bot account

  # Author-based routing fallback — maps GitHub login → vendor origin.
  # Used when no body / commit / branch pattern matches. Lets you skip the attribution
  # footer requirement when an author consistently uses a single agent.
  #   beingzy: claude    → PRs from beingzy treated as Claude-authored → Codex reviews them
  #   my-bot: codex      → PRs from my-bot treated as Codex-authored → Claude reviews them
  # NOTE: in `mode: cross-vendor` with BOTH vendors enabled, this map is bypassed —
  # if the same author commits via both agents, a static route is structurally wrong.
  # In that case, rely on attribution detection (body / commits / branch) and
  # `fallback_reviewer` below for PRs with no attribution markers.
  # author_routes:
  #   beingzy: claude

  # Fallback reviewer when origin cannot be determined (no pattern/branch/route matched).
  # 'auto'  = pick whichever vendor is currently authenticated (codex first, then claude).
  # 'codex' / 'claude' = always use that vendor.
  # null    = skip the PR (legacy cross-vendor behaviour).
  fallback_reviewer: auto

  # Branch-prefix routing — checked when body and commit patterns don't match.
  # Agents should branch with these prefixes (claude/* and codex/*) so origin is
  # always detectable even without attribution text in the PR body.
  claude_branch_prefixes:
    - "claude/"
  codex_branch_prefixes:
    - "codex/"

  # Body and commit pattern matching — checked first, before branch prefix.
  # Patterns are matched against both the PR body and commit messages (Co-Authored-By trailers).
  codex_reviews_patterns:
    - "Generated with \\[Claude Code\\]"    # PR body attribution footer
    - "Co-Authored-By: Claude"              # commit trailer added by Claude Code
  claude_reviews_patterns:
    - "Generated with \\[OpenAI Codex\\]"   # PR body attribution footer
    - "Co-Authored-By: codex"               # commit trailer added by Codex

# ─── Tunnel (watch mode only) ────────────────────────────────────────────────
# Controls how crosscheck watch receives GitHub webhook events on your laptop.
#
# localhost.run (default) — zero config, SSH tunnel, random URL each restart.
#   No install required. URL changes on reconnect → webhook re-registered automatically.
#   Limitation: events delivered while the tunnel is down are lost.
#
# smee — webhook relay via smee.io. Stable channel URL; events are queued and
#   replayed even when your laptop is offline or watch is restarted.
#   Setup:
#     1. npm install -g smee-client
#     2. Visit https://smee.io/new — copy the channel URL
#     3. Point your GitHub org/repo webhook Payload URL to the channel URL
#     4. Set tunnel.smee_channel below
#
# tunnel:
#   backend: smee
#   smee_channel: https://smee.io/your-channel-id

# ─── Server (serve mode only) ────────────────────────────────────────────────
server:
  port: 7891
  webhook_path: /webhook
  # pid_file: ~/.crosscheck/crosscheck.pid  # for daemon management

# ─── Post-Review Auto-Fix ────────────────────────────────────────────────────
# Controls HOW fixes are delivered after the agent applies them.
# Step sequencing (whether to run fix/recheck, trigger conditions, vendor assignment)
# is configured in ~/.crosscheck/workflow.yml.
#
post_review:
  auto_fix:
    delivery:
      mode: pull_request        # pull_request | commit | comment
      # pull_request → fix PR targets the original branch; human approves before merge
      # commit       → fixes pushed directly onto the original PR branch
      # comment      → suggested fixes posted as review comments only
      pr_title: "fix: address CR issues in #{original_pr_title}"
      label: cr-autofix         # GitHub label applied to the fix PR

# ─── Backtrace ───────────────────────────────────────────────────────────────
# On startup, scan all open PRs in the monitored scope and review any that have
# never received a [crosscheck] comment. Ensures coverage for PRs opened while
# crosscheck was offline or before it was first set up.
# Off by default — enable with the config below or pass --backtrace at startup.
# backtrace:
#   enabled: true   # set to true to enable the startup scan (or pass --backtrace)

# ─── Logs ────────────────────────────────────────────────────────────────────
# Structured debug logs written to ~/.crosscheck/logs/YYYY-MM-DD.ndjson
# Each line is a JSON object: { ts, level, event, ...context }
logs:
  enabled: true
  retention_days: 30  # delete files older than N days (min: 1, max: 365)

# ─── Display ─────────────────────────────────────────────────────────────────
# Terminal output theme for crosscheck watch.
# Override individual colors using chalk color names (red, green, blue, cyan,
# yellow, magenta, white, gray, dim, bold) or hex values (#rrggbb).
# display:
#   theme:
#     bar_fill: blue         # filled █ segments on the PR size bar
#     bar_empty: dim         # empty  ░ segments (all bars)
#     cr_approve: green      # CR bar + verdict label when APPROVE
#     cr_needs_work: yellow  # CR bar + verdict label when NEEDS WORK
#     cr_block: red          # CR bar + verdict label when BLOCK
#     fix_fill: cyan         # filled segments on the FIX bar


# ─── Branding ────────────────────────────────────────────────────────────────
# Customize how crosscheck identifies itself in review comments.
# Useful for teams, shared services, or personal branding.
# brand:
#   service_name: crosscheck              # shown in comment headers (default: crosscheck)
#   comment_header: ""                    # text prepended to every review comment
#   comment_footer: ""                    # text appended to every review comment
#   reviewer_attribution: ""             # replaces "Reviewed by {vendor}" attribution line
