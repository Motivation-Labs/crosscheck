mode: cross-vendor
vendors:
  codex:
    enabled: true
    model: o4-mini
    auth: subscription
    effort: medium
  claude:
    enabled: true
    model: sonnet
    effort: medium
quality:
  tier: balanced
  focus:
    - security
    - types
    - performance
  custom_prompt: |
    Focus on correctness and security. Be concise.
budget:
  codex_monthly_usd: 20
  per_review_usd: 2
orgs:
  - motivation-labs
  - codatta
routing:
  allowed_authors:
    - beingzy
  codex_reviews_patterns:
    - Generated with \[Claude Code\]
  claude_reviews_patterns:
    - Generated with \[OpenAI Codex\]
    - 'Co-Authored-By: codex'
  author_routes:
    beingzy: claude
  fallback_reviewer: auto
post_review:
  auto_fix:
    delivery:
      mode: pull_request
      pr_title: 'fix: address CR issues in #{original_pr_title}'
      label: cr-autofix
server:
  port: 7891
  webhook_path: /webhook
